<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="refresh" content="5" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rocket League Bot Training Report</title>
  <style>
    :root {
      --bg: #f7f7f2;
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: linear-gradient(180deg, #f3f4f6 0%, #f7f7f2 100%);
      color: var(--ink);
    }
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 32px;
    }
    .sub {
      color: var(--muted);
      margin-bottom: 20px;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .summary-card, .chart-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.05);
    }
    .summary-card {
      padding: 14px;
    }
    .summary-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .summary-card strong {
      font-size: 20px;
    }
    .chart-card {
      padding: 14px 14px 8px 14px;
      margin-bottom: 16px;
    }
    .chart-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: baseline;
    }
    .chart-head h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }
    .chart-meta {
      color: var(--muted);
      font-size: 13px;
    }
    .chart {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px;
      background: #fcfcfb;
    }
    .axis {
      stroke: #9ca3af;
      stroke-width: 1;
    }
    .empty {
      padding: 18px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Training Report</h1>
    <div class="sub">Auto-refreshes every 5 seconds. Stage backgrounds show curriculum transitions.</div>
    <p class="empty">No metrics yet. Start training and refresh this page.</p>
    
  </main>
</body>
</html>
